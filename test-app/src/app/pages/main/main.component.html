<div class="min-h-screen bg-gray-50 pt-6 pb-10 relative">
  <div class="absolute top-6 right-6">
    <button
      (click)="downloadReport()"
      class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-2.5 px-5 rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all duration-200 flex items-center gap-2"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
        ></path>
      </svg>
      PDF
    </button>
  </div>

  <div class="search-container w-full max-w-2xl mx-auto px-4 mb-8">
    <app-search-bar></app-search-bar>
  </div>

  @if (isLoading() && (!characters() || characters().length === 0)) {
    <div class="flex justify-center items-center mt-12">
      <mat-spinner diameter="50" class="text-blue-500"></mat-spinner>
    </div>
  }

  @if (characters().length) {
    <cdk-virtual-scroll-viewport
      itemSize="575"
      class="example-viewport h-[calc(100vh-160px)] w-full max-w-5xl mx-auto overflow-y-auto scroll-smooth border border-gray-200 rounded-2xl shadow-xl bg-white"
      (scrolledIndexChange)="onScroll($event)"
    >
      <div
        *cdkVirtualFor="let character of characters(); trackBy: trackById"
        class="flex justify-center py-6 px-4"
      >
        <app-character
          [character]="character"
          (click)="selectCharacterHandler(character)"
          class="block w-full max-w-sm cursor-pointer transform transition-all duration-300 ease-in-out hover:scale-105 hover:shadow-2xl rounded-xl"
        >
        </app-character>
      </div>
    </cdk-virtual-scroll-viewport>
  }

  @if (selectCharacter()) {
    <app-modal
      class="fixed inset-0 flex items-center justify-center bg-black/30 z-50 p-4 transition-opacity duration-300"
    >
    </app-modal>
  }
</div>
