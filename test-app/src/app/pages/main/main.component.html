<div class="min-h-screen bg-gray-50 pt-6 pb-10">

    <div class="search-container w-full max-w-2xl mx-auto px-4 mb-8">
        <app-search-bar></app-search-bar>
    </div>

    @if (isLoading() && (!characters() || characters().length === 0)) {
        <div class="flex justify-center items-center mt-12">
            <mat-spinner diameter="50" class="text-blue-500"></mat-spinner>
        </div>
    }

    @if (characters().length){
        <cdk-virtual-scroll-viewport
            itemSize="620"
            class="example-viewport h-[calc(100vh-160px)] w-full max-w-5xl mx-auto
                   overflow-y-auto scroll-smooth
                   border border-gray-200 rounded-2xl shadow-xl bg-white"
            (scrolledIndexChange)="onScroll($event)">

            <div *cdkVirtualFor="let character of characters()" class="flex justify-center py-6 px-4">
                <app-character
                    [character]="character"
                    (click)="selectCharacterHandler(character)"
                    class="block w-full max-w-sm cursor-pointer
                           transform transition-all duration-300 ease-in-out
                           hover:scale-105 hover:shadow-2xl rounded-xl">
                </app-character>
            </div>

        </cdk-virtual-scroll-viewport>
    }

    @if (selectCharacter()) {
        <app-modal
            class="fixed inset-0 flex items-center justify-center bg-black/30  z-50 p-4 transition-opacity duration-300">
        </app-modal>
    }

</div>
