<div class="w-full max-w-sm bg-white rounded-2xl shadow-lg hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 cursor-pointer p-5 border border-gray-100 flex flex-col h-full"
     (click)="openModal()">

  <div class="w-full h-72 mb-5 overflow-hidden rounded-xl bg-gray-100 shadow-inner relative">
    <img
      [src]="character().image"
      [alt]="character().name"
      class="w-full h-full object-cover hover:scale-105 transition-transform duration-700 ease-in-out"
      loading="lazy"
    >
  </div>

  <h2 class="text-2xl font-extrabold text-gray-900 mb-3 tracking-tight leading-none">
    {{ character().name }}
  </h2>

  <div class="text-gray-600 mb-5 space-y-2 text-sm flex-grow">
    <div class="flex items-center justify-between border-b border-gray-50 pb-1">
        <span class="font-bold text-gray-400 uppercase text-xs tracking-wider">Species</span>
        <span class="font-semibold text-gray-800">{{ character().species }}</span>
    </div>
    <div class="flex items-center justify-between border-b border-gray-50 pb-1">
        <span class="font-bold text-gray-400 uppercase text-xs tracking-wider">Gender</span>
        <span class="font-semibold text-gray-800">{{ character().gender }}</span>
    </div>
    <div class="flex items-center justify-between border-b border-gray-50 pb-1">
        <span class="font-bold text-gray-400 uppercase text-xs tracking-wider">Status</span>
        <span class="px-2 py-0.5 rounded-full text-xs font-bold"
              [class.bg-green-100]="character().status === 'Alive'"
              [class.text-green-700]="character().status === 'Alive'"
              [class.bg-red-100]="character().status === 'Dead'"
              [class.text-red-700]="character().status === 'Dead'"
              [class.bg-gray-100]="character().status === 'unknown'"
              [class.text-gray-700]="character().status === 'unknown'">
            {{ character().status }}
        </span>
    </div>
    <div class="pt-1">
        <span class="block font-bold text-gray-400 uppercase text-xs tracking-wider mb-1">Last Location</span>
        <span class="font-medium text-gray-800 leading-snug block truncate">{{ character().location.name }}</span>
    </div>
  </div>

</div>
