<div
  class="fixed inset-0 z-50 flex items-center justify-center transition-opacity"
  (mousedown)="close()"
>
  <div
    class="relative bg-white rounded-2xl shadow-2xl flex overflow-hidden border border-gray-800"
    (mousedown)="$event.stopPropagation()"
    [style.transform]="'scale(' + scaleFactor() + ')'"
    style="width: 1200px; height: 850px; transition: transform 0.1s linear"
  >
    <div
      class="w-72 bg-gray-50 p-6 flex flex-col gap-8 border-r border-gray-200 shrink-0 relative z-10"
    >
      <div class="space-y-1">
        <h3 class="text-2xl font-bold text-gray-900 tracking-tight">Editor</h3>
        <p class="text-xs text-gray-500 font-medium uppercase tracking-wider">Canvas</p>
      </div>

      <div class="space-y-4">
        <label class="block text-sm font-semibold text-gray-700">Shape Color</label>

        <div class="relative">
          <select
            [formControl]="colorControl"
            class="w-full appearance-none bg-white border border-gray-300 text-gray-700 py-3 px-4 pr-8 rounded-lg leading-tight focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all cursor-pointer font-medium"
          >
            <option [value]="colorPalette.red">Red</option>
            <option [value]="colorPalette.blue">Blue</option>
            <option [value]="colorPalette.green">Green</option>
          </select>
          <div
            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700"
          >
            <svg
              class="fill-current h-4 w-4"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 20 20"
            >
              <path
                d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"
              />
            </svg>
          </div>
        </div>

        <div class="flex items-center gap-2 mt-2">
          <span class="text-xs text-gray-500">Selected:</span>
          <div
            class="w-6 h-6 rounded-full border border-gray-200 shadow-sm"
            [style.backgroundColor]="'rgb(' + colorControl.value + ')'"
          ></div>
        </div>
      </div>

      <div class="flex-grow"></div>

      <div class="space-y-3">
        <button
          (click)="resetCanvas()"
          class="w-full px-4 py-3 rounded-xl text-sm font-semibold text-red-600 bg-red-50 hover:bg-red-100 hover:text-red-700 border border-transparent hover:border-red-200 transition-all duration-200 flex items-center justify-center gap-2 group"
        >
          <span>Clear Canvas</span>
        </button>

        <button
          (click)="saveAndClose()"
          class="w-full px-4 py-3 rounded-xl text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center gap-2"
        >
          Save Changes
        </button>
      </div>

      <div class="text-center pt-2">
        <button
          (click)="close()"
          class="text-xs text-gray-400 hover:text-gray-600 underline decoration-dotted"
        >
          Discard changes
        </button>
      </div>
    </div>

    <div class="flex-grow bg-gray-100/50 relative overflow-hidden flex items-center justify-center">
      <div
        class="absolute inset-0 opacity-[0.03]"
        style="
          background-image: radial-gradient(#000 1px, transparent 1px);
          background-size: 20px 20px;
        "
      ></div>

      <canvas #canvas class="relative z-10 shadow-2xl bg-white" style="width: 70%"></canvas>
    </div>
  </div>
</div>
