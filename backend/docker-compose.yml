version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: lumana_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  redis:
    image: redis/redis-stack:latest
    container_name: lumana_redis
    ports:
      - "6379:6379"
      - "8001:8001"
    restart: always

volumes:
  mongo_data:
